<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCR & TTS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #00e5a0;
            --danger: #ff4757;
            --warn: #ff6b35;
            --bg: #0b0f1a;
            --card: #111827;
            --card2: #1a2236;
            --text: #e8edf5;
            --muted: #6b7a99;
            --border: #1e2d42;
            --glow: rgba(108,99,255,0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 12px 10px 165px;
            background-image: 
                radial-gradient(ellipse at 80% 0%, rgba(108,99,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 0% 80%, rgba(0,229,160,0.05) 0%, transparent 50%);
        }

        /* HEADER */
        .app-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding: 0 2px;
        }
        .app-logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; box-shadow: 0 0 18px var(--glow);
        }
        .app-title { font-size: 1.15rem; font-weight: 800; letter-spacing: 0.04em; }
        .app-sub { font-size: 0.65rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-left: auto; }

        /* LIVE DISPLAY */
        #liveWordDisplay {
            background: #050810;
            border: 1px solid var(--primary);
            box-shadow: 0 0 20px var(--glow), inset 0 0 30px rgba(0,0,0,0.5);
            border-radius: 12px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.7rem;
            font-weight: 800;
            min-height: 56px;
            padding: 14px 10px;
            margin-bottom: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--secondary);
            overflow: hidden;
            position: relative;
            transition: color 0.2s;
        }
        #liveWordDisplay::before {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(108,99,255,0.06), transparent);
            animation: scan 3s linear infinite;
        }
        @keyframes scan { to { left: 140%; } }

        /* STATUS BAR */
        .status-bar {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex; align-items: center; gap: 6px;
        }
        .status-bar::before {
            content: '▮';
            color: var(--secondary);
            animation: blink 1.2s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* CARDS */
        .card {
            background: var(--card);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }
        .card-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        /* TEXTAREA */
        textarea {
            width: 100%;
            height: 160px;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            font-size: 15px;
            font-family: 'JetBrains Mono', monospace;
            background: #080c14;
            color: var(--text);
            resize: vertical;
            transition: border-color 0.2s;
            line-height: 1.6;
        }
        textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--glow); }

        /* INPUTS */
        input[type="text"], select {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #080c14;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            width: 100%;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, select:focus { outline: none; border-color: var(--primary); }
        select option { background: #111827; }

        input[type="range"] {
            -webkit-appearance: none; width: 100%;
            height: 4px; background: var(--border); border-radius: 4px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px;
            background: var(--primary); border-radius: 50%;
            box-shadow: 0 0 8px var(--glow);
        }

        /* BUTTONS */
        button {
            padding: 11px 8px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.15s;
            letter-spacing: 0.03em;
        }
        button:active { transform: scale(0.94); filter: brightness(0.85); }

        .btn-primary  { background: linear-gradient(135deg, var(--primary), #7c73ff); color: #fff; box-shadow: 0 4px 14px rgba(108,99,255,0.3); }
        .btn-green    { background: linear-gradient(135deg, #00b87a, var(--secondary)); color: #001a10; }
        .btn-red      { background: linear-gradient(135deg, #c0392b, var(--danger)); color: #fff; }
        .btn-orange   { background: linear-gradient(135deg, #e05e20, var(--warn)); color: #fff; }
        .btn-gray     { background: #1e2d42; color: var(--text); border: 1px solid var(--border); }
        .btn-purple   { background: linear-gradient(135deg, #7b2ff7, #a855f7); color: #fff; box-shadow: 0 4px 14px rgba(168,85,247,0.3); }
        .btn-teal     { background: linear-gradient(135deg, #0891b2, #06b6d4); color: #fff; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .mt8 { margin-top: 8px; }
        .mt10 { margin-top: 10px; }

        /* STATS */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 10px;
        }
        .stat-box {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }
        .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 800; color: var(--secondary); }
        .stat-lbl { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

        /* DOCK */
        .bottom-dock {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(11,15,26,0.97);
            backdrop-filter: blur(16px);
            padding: 10px 10px 14px;
            border-top: 1px solid var(--border);
            z-index: 1000;
        }
        .dock-row1 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            gap: 7px;
            margin-bottom: 7px;
        }
        .dock-row2 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 7px;
        }
        .dock-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            color: var(--muted);
            text-align: center;
            margin-bottom: 5px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* TOAST */
        #toast {
            position: fixed; bottom: 175px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--secondary); color: #001a10;
            font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 700;
            padding: 8px 18px; border-radius: 20px;
            opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
            z-index: 2000;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* PROGRESS */
        #ttsProgress {
            height: 3px; background: var(--border); border-radius: 3px; margin-top: 8px; overflow: hidden;
        }
        #ttsBar {
            height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px; transition: width 0.3s;
        }

        /* SECTION DIVIDER */
        .section-div {
            display: flex; align-items: center; gap: 8px; margin: 10px 0 8px;
        }
        .section-div span { font-family:'JetBrains Mono',monospace; font-size:0.6rem; color:var(--muted); white-space:nowrap; }
        .section-div::before, .section-div::after { content:''; flex:1; height:1px; background:var(--border); }
    </style>
</head>
<body>

<div class="app-header">
    <div class="app-logo">📄</div>
    <div>
        <div class="app-title">OCR · TTS PRO</div>
        <div style="font-size:0.6rem; color:var(--muted); font-family:'JetBrains Mono',monospace;">Advanced Text Processor</div>
    </div>
    <div class="app-sub" id="clockDisplay"></div>
</div>

<div id="liveWordDisplay">READY</div>
<div id="ttsProgress"><div id="ttsBar"></div></div>

<!-- STATS -->
<div class="stats-row" style="margin-top:10px;">
    <div class="stat-box"><div class="stat-val" id="statChars">0</div><div class="stat-lbl">Chars</div></div>
    <div class="stat-box"><div class="stat-val" id="statWords">0</div><div class="stat-lbl">Words</div></div>
    <div class="stat-box"><div class="stat-val" id="statLines">0</div><div class="stat-lbl">Lines</div></div>
</div>

<!-- MAIN TEXT -->
<div class="card">
    <div class="status-bar" id="status">System Standby</div>
    <textarea id="mainText" placeholder="Paste OCR or any text here..."></textarea>
</div>

<!-- CLEAN TOOLS -->
<div class="card">
    <div class="card-title">⚙️ Smart Clean Tools</div>
    <div class="grid-2">
        <button class="btn-green" onclick="smartClean()">🧹 OCR Clean</button>
        <button class="btn-purple" onclick="removeDuplicateLines()">🔁 Dedup Lines</button>
    </div>
    <div class="grid-3 mt8">
        <button class="btn-gray" onclick="trimLines()">✂️ Trim Lines</button>
        <button class="btn-gray" onclick="removeBlankLines()">🚫 All Blanks</button>
        <button class="btn-gray" onclick="sortLines()">🔤 Sort Lines</button>
    </div>
    <div class="mt8">
        <button class="btn-gray" style="width:100%;" onclick="removeDuplicateBlankLines()">🧽 Dedup Blank Lines</button>
    </div>
</div>

<!-- CUT TOOLS -->
<div class="card">
    <div class="card-title">✂️ Advanced Cut Tools</div>
    <input type="text" id="cutMarker" placeholder="Marker word / symbol (e.g. @)" style="margin-bottom:8px;">
    <div class="grid-2">
        <button class="btn-red" onclick="deleteBefore()">✂️ Del Before</button>
        <button class="btn-red" onclick="deleteAfter()">✂️ Del After</button>
    </div>

    <div class="section-div"><span>between markers</span></div>
    <div class="grid-2 mt8">
        <input type="text" id="startChar" placeholder="Start { or word">
        <input type="text" id="endChar" placeholder="End } or word">
    </div>
    <div class="grid-2 mt8">
        <button class="btn-red" onclick="deleteBetween()">🗑️ Delete Between</button>
        <button class="btn-teal" onclick="retainBetween()">📌 Retain Between</button>
    </div>
</div>

<!-- FIND & REPLACE -->
<div class="card">
    <div class="card-title">🔍 Find & Replace</div>
    <input type="text" id="findText" placeholder="Find..." style="margin-bottom:8px;">
    <input type="text" id="replaceText" placeholder="Replace with...">
    <div class="grid-2 mt8">
        <button class="btn-primary" onclick="findReplace(false)">Replace First</button>
        <button class="btn-primary" onclick="findReplace(true)">Replace All</button>
    </div>
</div>

<!-- VOICE -->
<div class="card">
    <div class="card-title">🎙️ Voice Preferences</div>
    <select id="voiceSelect" style="margin-bottom:10px;"></select>
    <div style="display:flex; align-items:center; gap:10px;">
        <span style="font-size:0.8rem; color:var(--muted); white-space:nowrap;">Speed</span>
        <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1" style="flex:1;">
        <span style="font-family:'JetBrains Mono',monospace; font-size:0.8rem; color:var(--secondary); min-width:28px;" id="rateLabel">1.0</span>
    </div>
    <div style="display:flex; align-items:center; gap:10px; margin-top:10px;">
        <span style="font-size:0.8rem; color:var(--muted); white-space:nowrap;">Pitch</span>
        <input type="range" id="pitch" min="0.5" max="2" value="1" step="0.1" style="flex:1;">
        <span style="font-family:'JetBrains Mono',monospace; font-size:0.8rem; color:var(--secondary); min-width:28px;" id="pitchLabel">1.0</span>
    </div>
</div>

<!-- BOTTOM DOCK -->
<div class="bottom-dock">
    <div class="dock-label">quick actions</div>
    <div class="dock-row1">
        <button class="btn-gray"   onclick="clearAll()">🗑️ CLR</button>
        <button class="btn-green"  onclick="smartClean()">🧹 CLN</button>
        <button class="btn-gray"   onclick="copyText()">📋 COPY</button>
        <button class="btn-gray"   onclick="pasteText()">📥 PASTE</button>
        <button class="btn-purple" onclick="removeDuplicateLines()">🔁 DEDUP</button>
    </div>
    <div class="dock-row2">
        <button class="btn-orange" onclick="synth.cancel(); status.textContent='STOPPED';">⏹ STOP</button>
        <button class="btn-gray"   onclick="pauseResume()">⏸ PAUSE</button>
        <button class="btn-primary" onclick="speak('en')">🗣️ EN</button>
        <button class="btn-orange"  onclick="speak('ml')">🗣️ ML</button>
    </div>
</div>

<div id="toast"></div>

<script>
    const synth = window.speechSynthesis;
    const mainText = document.getElementById('mainText');
    const liveWord = document.getElementById('liveWordDisplay');
    const statusEl = document.getElementById('status');
    const ttsBar = document.getElementById('ttsBar');
    let voices = [], speechQueue = [], currentChunkIndex = 0, currentLang = 'en';
    let isPaused = false;

    // Clock
    function updateClock() {
        const now = new Date();
        document.getElementById('clockDisplay').textContent = 
            now.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    }
    setInterval(updateClock, 1000); updateClock();

    // Stats update
    mainText.addEventListener('input', updateStats);
    function updateStats() {
        const v = mainText.value;
        document.getElementById('statChars').textContent = v.length;
        document.getElementById('statWords').textContent = v.trim() ? v.trim().split(/\s+/).length : 0;
        document.getElementById('statLines').textContent = v ? v.split('\n').length : 0;
    }

    // Range labels
    document.getElementById('rate').addEventListener('input', e => {
        document.getElementById('rateLabel').textContent = parseFloat(e.target.value).toFixed(1);
    });
    document.getElementById('pitch').addEventListener('input', e => {
        document.getElementById('pitchLabel').textContent = parseFloat(e.target.value).toFixed(1);
    });

    // Voices
    function loadVoices() {
        voices = synth.getVoices().filter(v => v.lang.startsWith('en') || v.lang.startsWith('ml'));
        const select = document.getElementById('voiceSelect');
        select.innerHTML = voices.map(v =>
            `<option value="${v.name}">${v.name} (${v.lang})</option>`
        ).join('');
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    // TTS
    function speak(langCode) {
        synth.cancel(); speechQueue = []; currentChunkIndex = 0; currentLang = langCode;
        isPaused = false;
        const fullText = mainText.value.trim();
        if (!fullText) { toast('No text to speak'); return; }
        speechQueue = fullText.match(/[^\.!\?\n]+[\.!\?\n]*/g) || [fullText];
        processQueue(langCode);
    }

    function processQueue(langCode) {
        ttsBar.style.width = `${Math.round((currentChunkIndex / speechQueue.length) * 100)}%`;
        if (currentChunkIndex >= speechQueue.length) {
            statusEl.textContent = 'FINISHED';
            liveWord.style.color = 'var(--secondary)';
            liveWord.innerText = '✓ DONE';
            ttsBar.style.width = '100%';
            return;
        }
        const textChunk = speechQueue[currentChunkIndex].trim();
        if (!textChunk) { currentChunkIndex++; processQueue(langCode); return; }

        const utterance = new SpeechSynthesisUtterance(textChunk);
        const selectedVoice = voices.find(v => v.name === document.getElementById('voiceSelect').value) ||
                              voices.find(v => v.lang.startsWith(langCode));
        utterance.voice = selectedVoice || null;
        utterance.rate  = parseFloat(document.getElementById('rate').value);
        utterance.pitch = parseFloat(document.getElementById('pitch').value);

        utterance.onstart = () => {
            statusEl.textContent = `SPEAKING ${currentChunkIndex + 1}/${speechQueue.length}`;
            liveWord.style.color = 'var(--secondary)';
        };
        utterance.onboundary = (e) => {
            if (e.name === 'word') liveWord.innerText = textChunk.substr(e.charIndex, e.charLength);
        };
        utterance.onend = () => { currentChunkIndex++; processQueue(langCode); };
        utterance.onerror = () => { currentChunkIndex++; processQueue(langCode); };
        synth.speak(utterance);
    }

    function pauseResume() {
        if (isPaused) { synth.resume(); isPaused = false; statusEl.textContent = 'RESUMED'; }
        else { synth.pause(); isPaused = true; statusEl.textContent = 'PAUSED'; }
    }

    // ── CLEAN TOOLS ──────────────────────────────────────────

    function smartClean() {
        let t = mainText.value;
        t = t.replace(/\r\n/g, '\n');
        t = t.replace(/[ \t]+/g, ' ');
        t = t.replace(/(\d)[Oo](\d)/g, '$10$2');
        t = t.replace(/([A-Z])1([A-Z])/g, '$1I$2');
        t = t.replace(/([a-z])1([a-z])/g, '$1l$2');
        t = t.replace(/([\u0d00-\u0d7f])\s([\u0d3e-\u0d4d])/g, '$1$2');
        t = t.split('\n').map(l => l.trim()).join('\n');
        mainText.value = t.trim();
        updateStats(); toast('OCR Clean Done');
    }

    function removeDuplicateLines() {
        const lines = mainText.value.split('\n');
        const seen = new Set();
        const unique = lines.filter(line => {
            const key = line.trim().toLowerCase();
            if (key === '') return true; // preserve blank lines
            if (seen.has(key)) return false;
            seen.add(key); return true;
        });
        const removed = lines.length - unique.length;
        mainText.value = unique.join('\n');
        updateStats();
        toast(`Removed ${removed} duplicate line${removed !== 1 ? 's' : ''}`);
    }

    function trimLines() {
        mainText.value = mainText.value.split('\n').map(l => l.trim()).join('\n');
        updateStats(); toast('Lines Trimmed');
    }

    function removeBlankLines() {
        mainText.value = mainText.value.split('\n').filter(l => l.trim() !== '').join('\n');
        updateStats(); toast('All Blank Lines Removed');
    }

    function removeDuplicateBlankLines() {
        const before = mainText.value.split('\n').length;
        mainText.value = mainText.value.replace(/(\n[ \t]*){3,}/g, '\n\n');
        const removed = before - mainText.value.split('\n').length;
        updateStats();
        toast(removed > 0 ? `Collapsed ${removed} extra blank line${removed !== 1 ? 's' : ''}` : 'No consecutive blanks found');
    }

    function sortLines() {
        const lines = mainText.value.split('\n');
        lines.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
        mainText.value = lines.join('\n');
        updateStats(); toast('Lines Sorted A→Z');
    }

    // ── CUT TOOLS ────────────────────────────────────────────

    function deleteBefore() {
        const m = document.getElementById('cutMarker').value;
        if (!m) { toast('Enter marker first'); return; }
        const i = mainText.value.indexOf(m);
        if (i !== -1) { mainText.value = mainText.value.substring(i); updateStats(); toast('Deleted before marker'); }
        else toast('Marker not found');
    }

    function deleteAfter() {
        const m = document.getElementById('cutMarker').value;
        if (!m) { toast('Enter marker first'); return; }
        const i = mainText.value.indexOf(m);
        if (i !== -1) { mainText.value = mainText.value.substring(0, i + m.length); updateStats(); toast('Deleted after marker'); }
        else toast('Marker not found');
    }

    function deleteBetween() {
        const s = document.getElementById('startChar').value;
        const e = document.getElementById('endChar').value;
        if (!s || !e) { toast('Enter start & end'); return; }
        const esc = str => str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`${esc(s)}[\\s\\S]*?${esc(e)}`, 'g');
        const orig = mainText.value;
        mainText.value = orig.replace(regex, '');
        updateStats();
        toast(orig !== mainText.value ? 'Deleted between markers' : 'Pattern not found');
    }

    function retainBetween() {
        const s = document.getElementById('startChar').value;
        const e = document.getElementById('endChar').value;
        if (!s || !e) { toast('Enter start & end'); return; }
        const esc = str => str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`${esc(s)}([\\s\\S]*?)${esc(e)}`, 'g');
        const matches = [];
        let m;
        while ((m = regex.exec(mainText.value)) !== null) {
            matches.push(m[1].trim());
        }
        if (matches.length === 0) { toast('No match found'); return; }
        mainText.value = matches.join('\n');
        updateStats();
        toast(`Retained ${matches.length} match${matches.length !== 1 ? 'es' : ''}`);
    }

    // ── FIND & REPLACE ───────────────────────────────────────

    function findReplace(all) {
        const find = document.getElementById('findText').value;
        const rep  = document.getElementById('replaceText').value;
        if (!find) { toast('Enter search text'); return; }
        if (all) {
            const orig = mainText.value;
            mainText.value = orig.split(find).join(rep);
            const count = orig.split(find).length - 1;
            updateStats(); toast(`Replaced ${count} occurrence${count !== 1 ? 's' : ''}`);
        } else {
            const i = mainText.value.indexOf(find);
            if (i !== -1) {
                mainText.value = mainText.value.substring(0, i) + rep + mainText.value.substring(i + find.length);
                updateStats(); toast('Replaced first occurrence');
            } else toast('Text not found');
        }
    }

    // ── UTILITIES ────────────────────────────────────────────

    function clearAll() {
        synth.cancel(); isPaused = false;
        mainText.value = '';
        liveWord.innerText = 'READY';
        liveWord.style.color = 'var(--secondary)';
        statusEl.textContent = 'CLEARED';
        ttsBar.style.width = '0%';
        ['cutMarker','startChar','endChar','findText','replaceText'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });
        updateStats(); toast('Cleared');
    }

    function copyText() {
        if (!mainText.value) { toast('Nothing to copy'); return; }
        navigator.clipboard.writeText(mainText.value).then(() => toast('Copied to clipboard'));
    }

    async function pasteText() {
        try {
            const t = await navigator.clipboard.readText();
            mainText.value += t;
            updateStats(); toast('Pasted from clipboard');
        } catch { toast('Paste failed — use long-press'); }
    }

    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg; el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2000);
    }

    updateStats();
</script>
</body>
</html>
