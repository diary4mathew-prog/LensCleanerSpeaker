<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>OCR & TTS Pro | Smart Text Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0c15;
            --surface: #10131f;
            --surface-elevated: #171c2c;
            --border-subtle: #23283e;
            --primary: #6c63ff;
            --primary-glow: rgba(108, 99, 255, 0.3);
            --secondary: #00e5a0;
            --accent-cyan: #2dd4bf;
            --danger: #ff5e7c;
            --warning: #ffb347;
            --text-main: #edf2fb;
            --text-muted: #8f9bb3;
            --text-dim: #5e6f8d;
        }

        body {
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            padding: 16px 14px 140px;
            min-height: 100vh;
        }

        /* header */
        .hero {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .title-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .badge-icon {
            background: linear-gradient(145deg, var(--primary), #9b8cff);
            width: 44px;
            height: 44px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            box-shadow: 0 8px 20px rgba(108, 99, 255, 0.25);
        }
        h1 {
            font-size: 1.65rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff, var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
            background: var(--surface);
            padding: 5px 12px;
            border-radius: 40px;
            border: 1px solid var(--border-subtle);
        }

        /* live display */
        .live-crystal {
            background: rgba(16, 19, 31, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid var(--primary);
            border-radius: 28px;
            padding: 16px 20px;
            margin-bottom: 20px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 0.02em;
            color: var(--secondary);
            box-shadow: 0 0 15px var(--primary-glow), inset 0 0 8px rgba(0,0,0,0.3);
            transition: all 0.2s;
            word-break: break-word;
        }

        /* progress */
        .progress-micro {
            background: var(--surface);
            height: 4px;
            border-radius: 4px;
            margin: 0 0 16px 0;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.25s ease;
        }

        /* stats grid */
        .stats-grid {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-pill {
            background: var(--surface);
            border-radius: 40px;
            padding: 6px 14px;
            border: 1px solid var(--border-subtle);
            flex: 1;
            text-align: center;
        }
        .stat-number {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.35rem;
            color: var(--secondary);
        }
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
        }

        /* card base */
        .card-modern {
            background: var(--surface);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 16px;
            border: 1px solid var(--border-subtle);
            transition: all 0.2s;
        }
        .card-header {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: var(--accent-cyan);
            text-transform: uppercase;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 3px solid var(--primary);
            padding-left: 12px;
        }
        textarea {
            width: 100%;
            background: #0c0f1a;
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-main);
            resize: vertical;
            transition: 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
        }
        input, select {
            background: #0c0f1a;
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 10px 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-main);
            width: 100%;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* button system - unified, no duplicates */
        .btn {
            border: none;
            border-radius: 60px;
            padding: 8px 14px;
            font-weight: 600;
            font-size: 0.75rem;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--surface-elevated);
            color: var(--text-main);
            border: 1px solid var(--border-subtle);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #827aff);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(108, 99, 255, 0.3);
        }
        .btn-success {
            background: linear-gradient(135deg, #00b87a, var(--secondary));
            color: #001a0e;
            border: none;
        }
        .btn-danger {
            background: linear-gradient(135deg, #d63e4e, var(--danger));
            color: white;
            border: none;
        }
        .btn-warning {
            background: linear-gradient(135deg, #e07c2c, var(--warning));
            color: #221000;
            border: none;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-muted);
        }
        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .btn:active { transform: scale(0.97); }

        /* layout grids */
        .grid-2cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }
        .grid-3cols {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 12px;
        }
        .flex-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .mt-2 { margin-top: 12px; }
        .mt-1 { margin-top: 8px; }
        .w-full { width: 100%; }

        /* bottom dock (clean, no duplicate actions) */
        .action-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 12, 21, 0.96);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-subtle);
            padding: 12px 16px 20px;
            z-index: 100;
        }
        .dock-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .dock-buttons .btn {
            flex: 1 0 auto;
            min-width: 70px;
            font-size: 0.7rem;
            padding: 8px 12px;
        }
        .toast-message {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--secondary);
            color: #001a0e;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            padding: 8px 18px;
            border-radius: 60px;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 200;
            white-space: nowrap;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .toast-message.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        hr {
            border-color: var(--border-subtle);
            margin: 10px 0;
        }
        @media (max-width: 520px) {
            .grid-3cols { grid-template-columns: 1fr 1fr; }
            .dock-buttons .btn { font-size: 0.65rem; }
            body { padding: 12px 12px 150px; }
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="title-section">
        <div class="badge-icon">📡</div>
        <div>
            <h1>OCR·TTS STUDIO</h1>
            <div style="font-size:0.7rem; color: var(--text-muted);">smart cleanup · voice fusion</div>
        </div>
    </div>
    <div class="sub" id="clockDisplay">--:--:--</div>
</div>

<div class="live-crystal" id="liveWordDisplay">⚡ READY</div>
<div class="progress-micro"><div class="progress-fill" id="ttsProgressFill"></div></div>

<div class="stats-grid">
    <div class="stat-pill"><div class="stat-number" id="statChars">0</div><div class="stat-label">Characters</div></div>
    <div class="stat-pill"><div class="stat-number" id="statWords">0</div><div class="stat-label">Words</div></div>
    <div class="stat-pill"><div class="stat-number" id="statLines">0</div><div class="stat-label">Lines</div></div>
</div>

<textarea id="mainText" rows="6" placeholder="📄 Paste OCR text, scanned notes, or any content..."></textarea>

<!-- SMART CLEAN (only unique tools, no duplicate) -->
<div class="card-modern">
    <div class="card-header">🧹 INTELLIGENT TEXT REFINEMENT</div>
    <div class="grid-2cols">
        <button class="btn btn-success" id="smartCleanBtn">✨ OCR Clean</button>
        <button class="btn btn-primary" id="dedupLinesBtn">🔁 Deduplicate Lines</button>
    </div>
    <div class="grid-3cols mt-2">
        <button class="btn btn-outline" id="trimLinesBtn">✂️ Trim Lines</button>
        <button class="btn btn-outline" id="removeBlanksBtn">🚫 Strip Blanks</button>
        <button class="btn btn-outline" id="sortLinesBtn">🔤 Sort A→Z</button>
    </div>
    <div class="mt-1">
        <button class="btn btn-outline w-full" id="collapseBlankBtn">🧽 Collapse consecutive blank lines</button>
    </div>
</div>

<!-- ADVANCED CUT & MARKER TOOLS (condensed) -->
<div class="card-modern">
    <div class="card-header">✂️ PRECISION CUTTER</div>
    <input type="text" id="cutMarker" placeholder="Marker word / symbol (e.g., @ or Chapter)" autocomplete="off">
    <div class="grid-2cols mt-2">
        <button class="btn btn-danger" id="deleteBeforeBtn">✂️ Delete Before</button>
        <button class="btn btn-danger" id="deleteAfterBtn">✂️ Delete After</button>
    </div>
    <div class="flex-row mt-2">
        <input type="text" id="startChar" placeholder="Start token { or [" style="flex:1;">
        <span style="color:var(--text-muted)">→</span>
        <input type="text" id="endChar" placeholder="End token } or ]" style="flex:1;">
    </div>
    <div class="grid-2cols mt-2">
        <button class="btn btn-warning" id="deleteBetweenBtn">🗑️ Delete Between</button>
        <button class="btn btn-primary" id="retainBetweenBtn">📌 Retain Between</button>
    </div>
</div>

<!-- FIND & REPLACE -->
<div class="card-modern">
    <div class="card-header">🔍 FIND & REPLACE</div>
    <div class="flex-row">
        <input type="text" id="findText" placeholder="Find phrase" style="flex:2;">
        <input type="text" id="replaceText" placeholder="Replace with" style="flex:2;">
    </div>
    <div class="grid-2cols mt-2">
        <button class="btn btn-outline" id="replaceFirstBtn">Replace First</button>
        <button class="btn btn-primary" id="replaceAllBtn">Replace All</button>
    </div>
</div>

<!-- VOICE CONTROLS -->
<div class="card-modern">
    <div class="card-header">🎙️ VOICE SYNTHESIS</div>
    <select id="voiceSelect"></select>
    <div class="flex-row mt-2">
        <span style="font-size:0.75rem;">⚡ Speed</span>
        <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1" style="flex:3;">
        <span id="rateLabel" style="font-family:monospace; min-width:32px;">1.0</span>
    </div>
    <div class="flex-row mt-1">
        <span style="font-size:0.75rem;">🎵 Pitch</span>
        <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1" style="flex:3;">
        <span id="pitchLabel" style="font-family:monospace; min-width:32px;">1.0</span>
    </div>
    <div class="grid-2cols mt-2">
        <button class="btn btn-success" id="speakEnBtn">🇬🇧 Speak English</button>
        <button class="btn btn-warning" id="speakMlBtn">🇮🇳 Speak Malayalam</button>
    </div>
    <div class="flex-row mt-2">
        <button class="btn btn-danger" id="stopSpeechBtn">⏹️ Stop</button>
        <button class="btn btn-outline" id="pauseResumeBtn">⏯️ Pause/Resume</button>
    </div>
</div>

<!-- BOTTOM DOCK (CURATED: only core essentials, no duplicate functions from above) -->
<div class="action-dock">
    <div class="dock-buttons">
        <button class="btn btn-outline" id="clearAllBtn">🗑️ Clear All</button>
        <button class="btn btn-success" id="smartCleanDockBtn">🧹 Clean</button>
        <button class="btn btn-outline" id="copyBtn">📋 Copy</button>
        <button class="btn btn-outline" id="pasteBtn">📥 Paste</button>
        <button class="btn btn-primary" id="dedupDockBtn">🔁 Dedup</button>
    </div>
</div>

<div id="toastMsg" class="toast-message"></div>

<script>
    // ----- DOM elements -----
    const textarea = document.getElementById('mainText');
    const liveDisplay = document.getElementById('liveWordDisplay');
    const progressFill = document.getElementById('ttsProgressFill');
    const statusToast = (msg) => {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1800);
    };

    // Stats
    function updateAllStats() {
        const val = textarea.value;
        document.getElementById('statChars').innerText = val.length;
        const words = val.trim() ? val.trim().split(/\s+/).length : 0;
        document.getElementById('statWords').innerText = words;
        const lines = val ? val.split('\n').length : 0;
        document.getElementById('statLines').innerText = lines;
    }
    textarea.addEventListener('input', updateAllStats);
    updateAllStats();

    // clock
    function updateClock() {
        const now = new Date();
        document.getElementById('clockDisplay').innerText = now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ------- TTS Engine ----------
    const synth = window.speechSynthesis;
    let voiceList = [];
    let speechQueue = [];
    let currentChunkIdx = 0;
    let currentLang = 'en';
    let isPausedFlag = false;
    let activeUtterance = null;

    function populateVoices() {
        voiceList = synth.getVoices().filter(v => v.lang.startsWith('en') || v.lang.startsWith('ml'));
        const select = document.getElementById('voiceSelect');
        if (voiceList.length) {
            select.innerHTML = voiceList.map(v => `<option value="${v.name}">${v.name} (${v.lang})</option>`).join('');
        } else {
            select.innerHTML = '<option>Default Voice</option>';
        }
    }
    if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = populateVoices;
    populateVoices();

    // process TTS chunks
    function processSpeechQueue() {
        if (!speechQueue.length) {
            progressFill.style.width = '100%';
            liveDisplay.innerText = '✓ COMPLETE';
            statusToast('Speech finished');
            return;
        }
        if (currentChunkIdx >= speechQueue.length) {
            progressFill.style.width = '100%';
            liveDisplay.innerText = '✓ DONE';
            return;
        }
        const chunk = speechQueue[currentChunkIdx].trim();
        if (!chunk) {
            currentChunkIdx++;
            processSpeechQueue();
            return;
        }
        const utterance = new SpeechSynthesisUtterance(chunk);
        const selectedVoiceName = document.getElementById('voiceSelect').value;
        const matchedVoice = voiceList.find(v => v.name === selectedVoiceName);
        utterance.voice = matchedVoice || (voiceList.find(v => v.lang.startsWith(currentLang)) || null);
        utterance.rate = parseFloat(document.getElementById('rate').value);
        utterance.pitch = parseFloat(document.getElementById('pitch').value);
        
        utterance.onstart = () => {
            const percent = (currentChunkIdx / speechQueue.length) * 100;
            progressFill.style.width = `${percent}%`;
        };
        utterance.onboundary = (e) => {
            if (e.name === 'word') {
                const wordPart = chunk.substr(e.charIndex, e.charLength);
                if (wordPart) liveDisplay.innerText = wordPart;
            }
        };
        utterance.onend = () => {
            currentChunkIdx++;
            processSpeechQueue();
        };
        utterance.onerror = () => {
            currentChunkIdx++;
            processSpeechQueue();
        };
        activeUtterance = utterance;
        synth.speak(utterance);
    }

    function startTTS(langCode) {
        if (synth.speaking) synth.cancel();
        isPausedFlag = false;
        const fullText = textarea.value.trim();
        if (!fullText) { statusToast('No text to speak'); return; }
        currentLang = langCode;
        speechQueue = fullText.match(/[^\.!\?\n]+[\.!\?\n]*/g) || [fullText];
        currentChunkIdx = 0;
        progressFill.style.width = '0%';
        processSpeechQueue();
    }

    function stopTTS() {
        synth.cancel();
        activeUtterance = null;
        speechQueue = [];
        currentChunkIdx = 0;
        progressFill.style.width = '0%';
        liveDisplay.innerText = '⏹ STOPPED';
        statusToast('Speech stopped');
    }

    function pauseResumeTTS() {
        if (synth.speaking && !synth.paused) {
            synth.pause();
            isPausedFlag = true;
            statusToast('Paused');
        } else if (synth.paused) {
            synth.resume();
            isPausedFlag = false;
            statusToast('Resumed');
        } else {
            statusToast('Nothing playing');
        }
    }

    // ------ TEXT PROCESSING (no duplicate buttons, all essential)
    function smartCleanText() {
        let t = textarea.value;
        t = t.replace(/\r\n/g, '\n');
        t = t.replace(/[ \t]+/g, ' ');
        t = t.replace(/(\d)[Oo](\d)/g, '$10$2');
        t = t.replace(/([A-Z])1([A-Z])/g, '$1I$2');
        t = t.replace(/([a-z])1([a-z])/g, '$1l$2');
        t = t.split('\n').map(l => l.trim()).join('\n');
        textarea.value = t.trim();
        updateAllStats();
        statusToast('✨ OCR Clean applied');
    }

    function deduplicateLines() {
        const lines = textarea.value.split('\n');
        const seen = new Set();
        const unique = [];
        for (let line of lines) {
            const key = line.trim().toLowerCase();
            if (key === '') { unique.push(line); continue; }
            if (!seen.has(key)) {
                seen.add(key);
                unique.push(line);
            }
        }
        const removed = lines.length - unique.length;
        textarea.value = unique.join('\n');
        updateAllStats();
        statusToast(`Removed ${removed} duplicate line${removed !== 1 ? 's' : ''}`);
    }

    function trimLines() {
        textarea.value = textarea.value.split('\n').map(l => l.trim()).join('\n');
        updateAllStats();
        statusToast('Trimmed line edges');
    }

    function removeBlankLines() {
        textarea.value = textarea.value.split('\n').filter(l => l.trim() !== '').join('\n');
        updateAllStats();
        statusToast('Removed all blank lines');
    }

    function collapseConsecutiveBlanks() {
        const beforeLen = textarea.value.split('\n').length;
        textarea.value = textarea.value.replace(/(\n[ \t]*){3,}/g, '\n\n');
        const afterLen = textarea.value.split('\n').length;
        updateAllStats();
        statusToast(`Collapsed extra blanks (${beforeLen - afterLen} lines removed)`);
    }

    function sortLinesAlphabetical() {
        const lines = textarea.value.split('\n');
        lines.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
        textarea.value = lines.join('\n');
        updateAllStats();
        statusToast('Lines sorted A→Z');
    }

    // cut tools
    function deleteBeforeMarker() {
        const marker = document.getElementById('cutMarker').value;
        if (!marker) { statusToast('Enter marker first'); return; }
        const idx = textarea.value.indexOf(marker);
        if (idx !== -1) { textarea.value = textarea.value.substring(idx); updateAllStats(); statusToast(`Deleted before "${marker}"`); }
        else statusToast('Marker not found');
    }
    function deleteAfterMarker() {
        const marker = document.getElementById('cutMarker').value;
        if (!marker) { statusToast('Enter marker'); return; }
        const idx = textarea.value.indexOf(marker);
        if (idx !== -1) { textarea.value = textarea.value.substring(0, idx + marker.length); updateAllStats(); statusToast(`Deleted after "${marker}"`); }
        else statusToast('Marker not found');
    }
    function deleteBetweenMarkers() {
        const s = document.getElementById('startChar').value;
        const e = document.getElementById('endChar').value;
        if (!s || !e) { statusToast('Both start & end tokens needed'); return; }
        const esc = (str) => str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`${esc(s)}[\\s\\S]*?${esc(e)}`, 'g');
        const newVal = textarea.value.replace(regex, '');
        if (newVal === textarea.value) statusToast('Pattern not found');
        else { textarea.value = newVal; updateAllStats(); statusToast('Deleted between markers'); }
    }
    function retainBetweenMarkers() {
        const s = document.getElementById('startChar').value;
        const e = document.getElementById('endChar').value;
        if (!s || !e) { statusToast('Start & end required'); return; }
        const esc = (str) => str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`${esc(s)}([\\s\\S]*?)${esc(e)}`, 'g');
        const matches = [];
        let m;
        while ((m = regex.exec(textarea.value)) !== null) {
            if (m[1] && m[1].trim()) matches.push(m[1].trim());
        }
        if (matches.length === 0) { statusToast('No content found between markers'); return; }
        textarea.value = matches.join('\n');
        updateAllStats();
        statusToast(`Retained ${matches.length} segment${matches.length !== 1 ? 's' : ''}`);
    }

    // find replace
    function replaceText(all) {
        const find = document.getElementById('findText').value;
        const rep = document.getElementById('replaceText').value;
        if (!find) { statusToast('Enter search text'); return; }
        if (all) {
            const original = textarea.value;
            const replaced = original.split(find).join(rep);
            const count = original.split(find).length - 1;
            textarea.value = replaced;
            updateAllStats();
            statusToast(`Replaced ${count} occurrence${count !== 1 ? 's' : ''}`);
        } else {
            const idx = textarea.value.indexOf(find);
            if (idx !== -1) {
                textarea.value = textarea.value.substring(0, idx) + rep + textarea.value.substring(idx + find.length);
                updateAllStats();
                statusToast('First occurrence replaced');
            } else statusToast('Not found');
        }
    }

    // clear & clipboard
    function clearAllFields() {
        stopTTS();
        textarea.value = '';
        document.getElementById('cutMarker').value = '';
        document.getElementById('startChar').value = '';
        document.getElementById('endChar').value = '';
        document.getElementById('findText').value = '';
        document.getElementById('replaceText').value = '';
        updateAllStats();
        liveDisplay.innerText = '🧹 CLEAR';
        statusToast('All cleared');
    }
    async function copyText() {
        if (!textarea.value) { statusToast('Nothing to copy'); return; }
        await navigator.clipboard.writeText(textarea.value);
        statusToast('Copied to clipboard');
    }
    async function pasteText() {
        try {
            const clip = await navigator.clipboard.readText();
            textarea.value += clip;
            updateAllStats();
            statusToast('Pasted from clipboard');
        } catch { statusToast('Paste failed — manual paste allowed'); }
    }

    // ----- Event bindings (no duplicates, streamlined) -----
    document.getElementById('smartCleanBtn').addEventListener('click', smartCleanText);
    document.getElementById('dedupLinesBtn').addEventListener('click', deduplicateLines);
    document.getElementById('trimLinesBtn').addEventListener('click', trimLines);
    document.getElementById('removeBlanksBtn').addEventListener('click', removeBlankLines);
    document.getElementById('sortLinesBtn').addEventListener('click', sortLinesAlphabetical);
    document.getElementById('collapseBlankBtn').addEventListener('click', collapseConsecutiveBlanks);
    document.getElementById('deleteBeforeBtn').addEventListener('click', deleteBeforeMarker);
    document.getElementById('deleteAfterBtn').addEventListener('click', deleteAfterMarker);
    document.getElementById('deleteBetweenBtn').addEventListener('click', deleteBetweenMarkers);
    document.getElementById('retainBetweenBtn').addEventListener('click', retainBetweenMarkers);
    document.getElementById('replaceFirstBtn').addEventListener('click', () => replaceText(false));
    document.getElementById('replaceAllBtn').addEventListener('click', () => replaceText(true));
    document.getElementById('speakEnBtn').addEventListener('click', () => startTTS('en'));
    document.getElementById('speakMlBtn').addEventListener('click', () => startTTS('ml'));
    document.getElementById('stopSpeechBtn').addEventListener('click', stopTTS);
    document.getElementById('pauseResumeBtn').addEventListener('click', pauseResumeTTS);
    document.getElementById('clearAllBtn').addEventListener('click', clearAllFields);
    document.getElementById('smartCleanDockBtn').addEventListener('click', smartCleanText);
    document.getElementById('copyBtn').addEventListener('click', copyText);
    document.getElementById('pasteBtn').addEventListener('click', pasteText);
    document.getElementById('dedupDockBtn').addEventListener('click', deduplicateLines);

    // Range labels
    document.getElementById('rate').addEventListener('input', e => document.getElementById('rateLabel').innerText = parseFloat(e.target.value).toFixed(1));
    document.getElementById('pitch').addEventListener('input', e => document.getElementById('pitchLabel').innerText = parseFloat(e.target.value).toFixed(1));
    
    // initial stats & set live word listener for tts visual 
    updateAllStats();
    // small dummy to reset visual when TTS ends
    window.addEventListener('beforeunload', () => synth.cancel());
</script>
</body>
</html>
