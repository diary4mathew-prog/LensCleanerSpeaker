<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bilingual OCR Assistant</title>
    <style>
        :root { --p: #4f46e5; --bg: #f8fafc; --text: #1e293b; --danger: #ef4444; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 10px; padding-bottom: 150px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #e2e8f0; }
        #liveWordDisplay { background: #000; color: #10b981; padding: 20px; border-radius: 12px; text-align: center; font-size: 1.5rem; font-weight: bold; min-height: 40px; margin-bottom: 10px; }
        textarea { width: 100%; height: 120px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; font-size: 16px; }
        .dock { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 10px; border-top: 1px solid #ddd; display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        button { padding: 12px 5px; border-radius: 8px; border: none; font-weight: bold; color: white; font-size: 0.8rem; cursor: pointer; }
        .btn-blue { background: var(--p); } .btn-green { background: #10b981; } .btn-red { background: var(--danger); } .btn-gray { background: #64748b; }
    </style>
</head>
<body>

    <div id="liveWordDisplay">READY</div>

    <button onclick="unlockAudio()" id="unlockBtn" style="width:100%; background: orange; margin-bottom: 10px;">⚠️ TAP TO ENABLE SPEECH FIRST</button>

    <div class="card">
        <textarea id="mainText" placeholder="Paste text here..."></textarea>
        <input type="text" id="marker" placeholder="Marker (for Cut tools)" style="width:100%; margin-top:10px; padding:8px; border-radius:5px; border:1px solid #ccc;">
    </div>

    <div class="card">
        <select id="vSelect" style="width:100%; padding:10px; border-radius:8px;"></select>
    </div>

    <div class="dock">
        <button class="btn-gray" onclick="clearAll()">CLR</button>
        <button class="btn-green" onclick="smartClean()">CLN</button>
        <button class="btn-blue" onclick="speak('en')">EN</button>
        <button class="btn-red" onclick="speak('ml')">ML</button>
    </div>

    <script>
        const synth = window.speechSynthesis;
        let voices = [];

        function unlockAudio() {
            // "Wakes up" the engine by speaking a silent string
            const u = new SpeechSynthesisUtterance("System Ready");
            u.volume = 0;
            synth.speak(u);
            document.getElementById('unlockBtn').style.display = 'none';
        }

        function loadVoices() {
            voices = synth.getVoices().filter(v => v.lang.startsWith('en') || v.lang.startsWith('ml'));
            document.getElementById('vSelect').innerHTML = voices.map(v => `<option value="${v.name}">${v.name}</option>`).join('');
        }
        if (speechSynthesis.onvoiceschanged !== undefined) { speechSynthesis.onvoiceschanged = loadVoices; }

        function speak(lang) {
            synth.cancel();
            const text = document.getElementById('mainText').value;
            if(!text) return;

            const u = new SpeechSynthesisUtterance(text);
            const vName = document.getElementById('vSelect').value;
            u.voice = voices.find(v => v.name === vName) || voices.find(v => v.lang.startsWith(lang));
            
            // Boundary event (Teleprompter)
            u.onboundary = (e) => {
                if (e.name === 'word') {
                    document.getElementById('liveWordDisplay').innerText = text.substr(e.charIndex, e.charLength);
                }
            };
            
            u.onend = () => { document.getElementById('liveWordDisplay').innerText = "DONE"; };
            synth.speak(u);
        }

        function clearAll() {
            document.getElementById('mainText').value = '';
            document.getElementById('liveWordDisplay').innerText = 'READY';
            synth.cancel();
        }

        function smartClean() {
            let t = document.getElementById('mainText').value;
            t = t.replace(/\s+/g, ' ').replace(/(\d)[Oo](\d)/g, '$10$2').replace(/([A-Z])1([A-Z])/g, '$1I$2');
            document.getElementById('mainText').value = t.trim();
        }
    </script>
</body>
</html>
